<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>健身課表</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#111111;
  --bg2:#1c1c1e;
  --bg3:#2c2c2e;
  --text:#f0f0f0;
  --text2:#999;
  --text3:#555;
  --accent:#f0a030;
  --green:#34c759;
  --purple:#bf5af2;
  --border:rgba(255,255,255,0.09);
  --radius:12px;
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#f2f2f7;
    --bg2:#ffffff;
    --bg3:#e5e5ea;
    --text:#111111;
    --text2:#666666;
    --text3:#aaaaaa;
    --border:rgba(0,0,0,0.1);
  }
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:100px;
  -webkit-tap-highlight-color:transparent;
}

header{
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  border-bottom:0.5px solid var(--border);
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;
}
h1{font-size:26px;font-weight:600;letter-spacing:-.3px}
.clear-btn{
  background:none;border:none;
  color:var(--text3);font-size:13px;
  cursor:pointer;font-family:inherit;
  padding:4px 0;
}
.clear-btn:active{color:var(--text2)}

.week-strip{
  display:flex;gap:5px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none;
}
.week-strip::-webkit-scrollbar{display:none}
.ws-label{font-size:11px;color:var(--text3);display:flex;align-items:center;padding-right:4px;white-space:nowrap}
.ws-box{
  display:flex;align-items:center;justify-content:center;
  min-width:42px;height:32px;border-radius:6px;
  font-size:12px;font-weight:500;border:0.5px solid var(--border);
  white-space:nowrap;
}
.ws-u{background:rgba(240,160,48,0.15);color:var(--accent);border-color:rgba(240,160,48,0.3)}
.ws-l{background:rgba(52,199,89,0.15);color:var(--green);border-color:rgba(52,199,89,0.3)}
.ws-rest{background:none;color:var(--text3)}
.ws-skip{background:none;color:var(--text3);text-decoration:line-through;opacity:.5}
.ws-div{width:0.5px;background:var(--border);margin:4px 2px}

.tabs{
  display:flex;
  background:var(--bg3);
  padding:3px;
  gap:3px;
}
.tab-btn{
  flex:1;min-width:0;
  background:none;border:none;border-radius:8px;
  padding:10px 4px;
  color:var(--text2);font-size:16px;font-weight:500;
  cursor:pointer;text-align:center;
  font-family:inherit;
  transition:background .15s,color .15s;
}
.tab-btn.active{
  background:var(--accent);
  color:#000;font-weight:700;
}

main{padding:12px}

.principle{
  font-size:16px;color:var(--text2);
  background:var(--bg3);border-radius:8px;
  padding:8px 12px;margin-bottom:14px;line-height:1.5;
}
.skip-note{
  font-size:15px;color:var(--accent);
  margin-top:-6px;margin-bottom:12px;
  padding:0 2px;
}

.ex-card{
  background:var(--bg2);
  border:0.5px solid var(--border);
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:10px;
}
.ex-header{
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:8px;
  margin-bottom:8px;
}
.ex-name{font-size:20px;font-weight:600;line-height:1.4}
.badge-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.badge{font-size:14px;padding:3px 10px;border-radius:20px}
.badge-new{background:rgba(52,199,89,0.15);color:var(--green)}
.badge-super{background:rgba(191,90,242,0.15);color:var(--purple)}
.cue-btn{
  background:none;border:none;
  color:var(--accent);font-size:20px;
  cursor:pointer;padding:0;
  flex-shrink:0;line-height:1;
  transition:color .15s;
}
.cue-btn:active{color:var(--text)}
.cue-text{
  font-size:16px;color:var(--text2);
  background:var(--bg3);border-radius:8px;
  padding:8px 10px;margin-bottom:10px;
  line-height:1.6;display:none;
}
.cue-text.open{display:block}
.cue-wrap{display:none;margin-bottom:10px;}
.cue-wrap.open{display:block}
.cue-textarea{
  width:100%;
  min-height:64px;
  background:var(--bg3);
  border:0.5px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:20px;
  font-family:inherit;
  padding:10px 12px;
  line-height:1.6;
  resize:vertical;
  transition:border-color .15s;
}
.cue-textarea:focus{outline:none;border-color:var(--accent)}
.cue-textarea::placeholder{color:var(--text3)}

/* Sets rows */
.sets-col{
  display:flex;flex-direction:column;gap:8px;
  margin-bottom:12px;
}
.set-row{display:flex;align-items:center;gap:6px;}



/* Shared input style */
.num-input{
  background:var(--bg3);
  border:0.5px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:17px;
  font-family:inherit;
  padding:9px 4px;
  text-align:center;
  transition:border-color .15s;
  -moz-appearance:textfield;
}
.num-input:focus{outline:none;border-color:var(--accent)}
.num-input::placeholder{color:var(--text3)}
.num-input::-webkit-inner-spin-button,
.num-input::-webkit-outer-spin-button{-webkit-appearance:none}

.inp-weight{width:70px;}
.inp-sets{width:40px;}
.inp-reps{width:40px;}

.set-sep{font-size:16px;color:var(--text3);}



/* Ratings */
.ratings-col{display:flex;flex-direction:column;gap:6px;margin-top:2px}
.ratings-row{display:flex;align-items:center;gap:8px}
.rating-emoji{font-size:22px;flex-shrink:0}
.rating-summary{font-size:13px;color:var(--text2)}



.set-actions{display:flex;gap:8px;margin-bottom:4px;}
.set-action-btn{
  background:none;border:0.5px solid var(--border);border-radius:8px;
  color:var(--text2);font-size:16px;padding:8px 16px;
  cursor:pointer;font-family:inherit;transition:background .1s;
}
.set-action-btn:active{background:var(--bg3)}
.copy-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:none;
  border:0.5px solid var(--border);
  border-radius:var(--radius);
  color:var(--text2);
  padding:12px 16px;width:100%;
  cursor:pointer;font-size:17px;
  font-family:inherit;margin-top:8px;
  transition:background .1s,color .1s;
}
.copy-btn:active{background:var(--bg3);color:var(--text)}

.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%);
  background:var(--text);color:var(--bg);
  padding:10px 20px;border-radius:20px;
  font-size:14px;opacity:0;
  transition:opacity .2s;
  pointer-events:none;white-space:nowrap;z-index:999;
}
.toast.show{opacity:1}

.day-panel{display:none}
.day-panel.active{display:block}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>💪 健身課表</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="syncStatus" style="font-size:13px;color:var(--text3)" title=""></span>
      <button class="clear-btn" onclick="showTokenUI()" style="font-size:16px;padding:4px">⚙️</button>
    </div>
  </div>
  <div class="week-strip">
    <span class="ws-label">4天週</span>
    <div class="ws-box ws-u">上 A</div>
    <div class="ws-box ws-l">下 A</div>
    <div class="ws-box ws-rest">休</div>
    <div class="ws-box ws-u">上 B</div>
    <div class="ws-box ws-l">下 B</div>
    <div class="ws-div"></div>
    <span class="ws-label">3天週</span>
    <div class="ws-box ws-u">上 A</div>
    <div class="ws-box ws-l">下 A</div>
    <div class="ws-box ws-u">上 B</div>
    <div class="ws-box ws-skip">下 B</div>
  </div>
  <div class="tabs" id="tabBar"></div>
  <div id="daySubLabel" style="text-align:center;font-size:15px;color:var(--text2);padding:5px 0 2px;"></div>
  <div id="daySubLabel" style="text-align:center;font-size:15px;color:var(--text2);padding:4px 0 8px;"></div>
</header>

<main id="mainContent"></main>

<div class="toast" id="toast"></div>

<!-- Token overlay -->
<div id="tokenOverlay" style="display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.7);align-items:center;justify-content:center;padding:24px">
  <div style="background:var(--bg2);border-radius:16px;padding:24px;width:100%;max-width:360px">
    <div style="font-size:16px;font-weight:600;margin-bottom:8px">GitHub Token 設定</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6">
      輸入有 <code style="background:var(--bg3);padding:1px 5px;border-radius:4px">gist</code> 權限的 GitHub Token，資料將存在私人 Gist。
    </div>
    <input id="tokenInput" type="password"
      placeholder="ghp_xxxxxxxxxxxx"
      style="width:100%;background:var(--bg3);border:0.5px solid var(--border);
        border-radius:8px;color:var(--text);font-size:15px;padding:10px 12px;
        font-family:inherit;margin-bottom:12px"
      value="">
    <div style="display:flex;gap:10px">
      <button onclick="applyToken()"
        style="flex:1;background:var(--accent);border:none;border-radius:10px;
          color:#000;font-size:15px;font-weight:600;padding:11px;cursor:pointer;font-family:inherit">
        儲存
      </button>
      <button onclick="hideTokenUI()"
        style="flex:1;background:var(--bg3);border:none;border-radius:10px;
          color:var(--text);font-size:15px;padding:11px;cursor:pointer;font-family:inherit">
        取消
      </button>
    </div>
  </div>
</div>

<script>
const DAYS = [
  {
    id:'upper-a', label:'上肢 A', sublabel:'胸背推拉',
    principle:'3組12下 ／ 肩推3組10下 ／ 手臂2組12下',
    exercises:[
      {id:'ua1', name:'上斜機械推',
        cue:'把手對準乳頭上鎖骨下，屁股坐到底、背貼緊，胸口迎向把手往斜前上方推',
        defaultSets:[{c:1,r:12},{c:2,r:12}]},
      {id:'ua2', name:'反握滑輪下拉',
        cue:'坐最前排，手肘不外張，直上直下',
        defaultSets:[{c:1,r:12},{c:2,r:12}]},
      {id:'ua3', name:'坐姿肩推',
        cue:'收肩膀再握把',
        defaultSets:[{c:1,r:10},{c:2,r:10}]},
      {id:'ua4', name:'蝴蝶機夾胸 / 黑門左右',
        cue:null,
        defaultSets:[{c:1,r:12},{c:2,r:12}]},
      {id:'ua5', name:'二頭彎舉',
        cue:'黑門高度3',
        defaultSets:[{c:1,r:12},{c:1,r:12}]},
      {id:'ua6', name:'滑輪下壓（三頭）',
        cue:'___格 ___磅',
        defaultSets:[{c:3,r:12}]},
    ]
  },
  {
    id:'lower-a', label:'下肢 A', sublabel:'股四頭主',
    principle:'腿推4組10下 ／ 其餘3組12下 ／ 核心3組15下',
    exercises:[
      {id:'la1', name:'腿推機', isNew:true,
        cue:'雙腳與肩同寬，腳尖微外八，背貼緊背墊，膝蓋不鎖死',
        defaultSets:[{c:2,r:10},{c:2,r:10}]},
      {id:'la2', name:'膝屈伸機',
        cue:null,
        defaultSets:[{c:1,r:12},{c:2,r:12}]},
      {id:'la3', name:'卷腹機',
        cue:'高___格',
        defaultSets:[{c:3,r:15}]},
    ]
  },
  {
    id:'upper-b', label:'上肢 B', sublabel:'背肩主',
    principle:'3組12下 ／ 側平舉3組15下',
    exercises:[
      {id:'ub1', name:'坐姿划船',
        cue:'收肩完再拉，頂點停頓',
        defaultSets:[{c:1,r:12},{c:2,r:12}]},
      {id:'ub2', name:'正握滑輪下拉',
        cue:'吸氣拉把，收肩抬頭，手肘用力帶到口袋，到底停頓',
        defaultSets:[{c:1,r:12},{c:2,r:12}]},
      {id:'ub3', name:'機械側平舉（黑門）',
        cue:'椅高7', superSet:true,
        defaultSets:[{c:3,r:15}]},
      {id:'ub4', name:'反向飛鳥',
        cue:null, superSet:true,
        defaultSets:[{c:1,r:12},{c:2,r:12}]},
      {id:'ub5', name:'臥姿胸推 / 黑門左右',
        cue:'跟上肢 A 的上斜推換角度；臥姿胸推動作還在摸索可先繼續用黑門',
        defaultSets:[{c:1,r:12},{c:2,r:12}]},
    ]
  },
  {
    id:'lower-b', label:'下肢 B', sublabel:'後鏈主',
    principle:'羅馬尼亞4組10下 ／ 其餘3組12下 ／ 核心3組15下',
    skipNote:'★ 忙或沒恢復可跳過這天',
    exercises:[
      {id:'lb1', name:'羅馬尼亞深蹲（啞鈴）',
        cue:null,
        defaultSets:[{c:1,r:10},{c:2,r:10},{c:1,r:10}]},
      {id:'lb2', name:'腿後勾機',
        cue:'位置從上到下3~4',
        defaultSets:[{c:1,r:12},{c:2,r:12}]},
      {id:'lb3', name:'卷腹機',
        cue:'高___格',
        defaultSets:[{c:3,r:15}]},
    ]
  }
];

/* ── State ──
  S[exId] = {
    b: null|0-10,      // best feel rating
    w: null|0-10,      // this-week rating
    sets: [{wt:'', c:'', r:''}]   // per-set data
  }
*/
const GIST_ID = '0e147446e07570f668fbaa8dbd451799';
const GIST_FILE = 'yentool-workout.json';
let S = {};
let _syncTimer = null;

function getToken(){ return localStorage.getItem('wo_token') || ''; }
function saveToken(t){ localStorage.setItem('wo_token', t.trim()); }

function load(){
  try { S = JSON.parse(localStorage.getItem('wo_v3') || '{}'); } catch(e){ S = {}; }
}
function save(){
  localStorage.setItem('wo_v3', JSON.stringify(S));
  schedulSync();
}

function schedulSync(){
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncToGist, 1500);
}

async function syncToGist(){
  const token = getToken();
  if(!token) return;
  setSyncStatus('syncing');
  try {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(S) } } })
    });
    if(!res.ok) throw new Error(res.status);
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('err');
  }
}

async function loadFromGist(){
  const token = getToken();
  if(!token){ showTokenUI(); return; }
  setSyncStatus('syncing');
  try {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if(res.status === 401){ showTokenUI(); setSyncStatus('err'); return; }
    if(!res.ok) throw new Error(res.status);
    const data = await res.json();
    const content = data.files[GIST_FILE]?.content;
    if(content){
      const remote = JSON.parse(content);
      if(Object.keys(remote).length > 0){
        S = remote;
        localStorage.setItem('wo_v3', JSON.stringify(S));
        // re-render to reflect loaded data
        document.getElementById('tabBar').innerHTML = '';
        document.getElementById('mainContent').innerHTML = '';
        build();
      }
    }
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('err');
  }
}

function setSyncStatus(state){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  const map = { syncing:'☁️', ok:'✓', err:'⚠️' };
  el.textContent = map[state] || '';
  el.title = state === 'err' ? '同步失敗，請檢查 token' : state === 'syncing' ? '同步中…' : '已同步';
}

function showTokenUI(){
  document.getElementById('tokenOverlay').style.display = 'flex';
}
function hideTokenUI(){
  document.getElementById('tokenOverlay').style.display = 'none';
}
function applyToken(){
  const t = document.getElementById('tokenInput').value.trim();
  if(!t) return;
  saveToken(t);
  hideTokenUI();
  loadFromGist();
}

const DEFAULT_EMOJIS = ['👍','✅'];

function exState(id, defaultSets){
  if(!S[id]) S[id] = {};
  const d = S[id];
  const defC = String(defaultSets[0]?.c||'');
  const defR = String(defaultSets[0]?.r||'');
  // migrate old formats
  if(d.sets){ // from emoji-array format
    d.b = d.sets.filter(s=>s.emoji==='👍').map(({wt,c,r})=>({wt,c,r}));
    d.w = d.sets.filter(s=>s.emoji==='✅').map(({wt,c,r})=>({wt,c,r}));
    if(!d.b.length) d.b = [{wt:'',c:defC,r:defR}];
    if(!d.w.length) d.w = [{wt:'',c:defC,r:defR}];
    delete d.sets;
  }
  if(!Array.isArray(d.b)) d.b = [{wt:'',c:defC,r:defR}];
  if(!Array.isArray(d.w)) d.w = [{wt:'',c:defC,r:defR}];
  return d;
}

/* ── Build ── */
function build(){
  const bar = document.getElementById('tabBar');
  const main = document.getElementById('mainContent');

  DAYS.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0 ? ' active' : '');
    btn.innerHTML = day.label;
    btn.onclick = () => switchDay(i);
    bar.appendChild(btn);

    const panel = document.createElement('div');
    panel.id = 'panel-' + i;
    panel.className = 'day-panel' + (i===0 ? ' active' : '');

    let html = `<div class="principle">${day.principle}</div>`;
    if(day.skipNote) html += `<div class="skip-note">${day.skipNote}</div>`;

    let skip = false;
    day.exercises.forEach((ex_, j) => {
      if(skip){ skip=false; return; }
      const next = day.exercises[j+1];
      const isSuperPair = ex_.superSet && next && next.superSet;
      if(isSuperPair){
        html += `<div style="border:1px solid rgba(191,90,242,0.25);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;">
          <div style="padding:5px 12px;font-size:11px;color:var(--purple);background:rgba(191,90,242,0.08)">⚡ 超級組 — 兩個動作背靠背連做，組間才休息</div>
          ${exCard(ex_, true)}
          ${exCard(next, true)}
        </div>`;
        skip = true;
      } else {
        html += exCard(ex_, false);
      }
    });

    html += `<button class="copy-btn" onclick="copyDay(${i})">📋 複製本日記錄</button>`;
    panel.innerHTML = html;
    main.appendChild(panel);
  });
}

function exCard(ex_, inSuper){
  const d = exState(ex_.id, ex_.defaultSets);

  let badges = '';
  if(ex_.isNew) badges += `<span class="badge badge-new">新增</span>`;
  if(ex_.superSet && !inSuper) badges += `<span class="badge badge-super">超級組</span>`;

  const cueBtn = `<button class="cue-btn" onclick="toggleCue('c-${ex_.id}')" title="備註">ⓘ</button>`;
  const savedCue = (S[ex_.id] && S[ex_.id].cue !== undefined) ? S[ex_.id].cue : (ex_.cue || '');
  const cueDiv = `<div class="cue-wrap" id="c-${ex_.id}"><textarea class="cue-textarea" rows="3"
    placeholder="輸入備註..."
    oninput="setCue('${ex_.id}',this.value)">${savedCue}</textarea></div>`;

  const mkSection = (type, arr) => {
    const emoji = type==='b'?'👍':'✅';
    let s = `<div class="sets-col" id="sets-${ex_.id}-${type}">`;
    arr.forEach((row,i) => { s += singleRowHTML(ex_.id, type, i, row); });
    s += `</div><div class="set-actions">
      <button class="set-action-btn" onclick="addRow('${ex_.id}','${type}')">＋ 加組</button>
      <button class="set-action-btn" onclick="removeRow('${ex_.id}','${type}')">－ 減組</button>
    </div>`;
    return s;
  };
  const setsHtml = mkSection('b', d.b) + '<div style="height:6px"></div>' + mkSection('w', d.w);
  const ratings = '';

  const cardStyle = inSuper ? 'border-radius:0;border:none;border-bottom:0.5px solid var(--border);margin-bottom:0' : '';
  return `<div class="ex-card" style="${cardStyle}">
    <div class="ex-header">
      <div>
        <div class="ex-name">${ex_.name}</div>
        ${badges ? `<div class="badge-row">${badges}</div>` : ''}
      </div>
      ${cueBtn}
    </div>
    ${cueDiv}
    ${setsHtml}
    ${ratings}
  </div>`;
}

function singleRowHTML(exId, type, i, s){
  const emoji = type==='b'?'👍':'✅';
  return `<div class="set-row" id="sr-${exId}-${type}-${i}">
    <span style="font-size:22px;width:28px;text-align:center;flex-shrink:0">${emoji}</span>
    <input class="num-input inp-weight" type="number" step="0.25" min="0"
      inputmode="decimal" placeholder="重量" value="${s.wt||''}"
      oninput="setRowField('${exId}','${type}',${i},'wt',this.value)">
    <span class="set-sep">kg ×</span>
    <input class="num-input inp-sets" type="number" step="1" min="1"
      inputmode="numeric" placeholder="組" value="${s.c||''}"
      oninput="setRowField('${exId}','${type}',${i},'c',this.value)">
    <span class="set-sep">組</span>
    <input class="num-input inp-reps" type="number" step="1" min="1"
      inputmode="numeric" placeholder="下" value="${s.r||''}"
      oninput="setRowField('${exId}','${type}',${i},'r',this.value)">
    <span class="set-sep">下</span>
  </div>`;
}

function setRowField(exId, type, i, field, val){
  if(!S[exId]?.[type]) return;
  S[exId][type][i][field] = val;
  save();
}

function addRow(exId, type){
  const d = S[exId]; if(!d) return;
  const arr = d[type];
  const last = arr[arr.length-1] || {wt:'',c:'',r:''};
  arr.push({wt:'', c:last.c, r:last.r});
  save();
  const col = document.getElementById('sets-'+exId+'-'+type);
  const div = document.createElement('div');
  div.innerHTML = singleRowHTML(exId, type, arr.length-1, arr[arr.length-1]);
  col.appendChild(div.firstElementChild);
}

function removeRow(exId, type){
  const d = S[exId]; if(!d) return;
  const arr = d[type];
  if(arr.length <= 1) return;
  arr.pop(); save();
  const col = document.getElementById('sets-'+exId+'-'+type);
  col.removeChild(col.lastElementChild);
}









/* ── Actions ── */
function switchDay(n){
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.className = 'tab-btn' + (i===n?' active':''));
  document.querySelectorAll('.day-panel').forEach((p,i) => p.className = 'day-panel' + (i===n?' active':''));
  window.scrollTo({top:0,behavior:'smooth'});
  const sub = document.getElementById('daySubLabel');
  if(sub) sub.textContent = DAYS[n].sublabel;
}

function toggleCue(id){ document.getElementById(id).classList.toggle('open'); }

function setCue(id, val){
  if(!S[id]) S[id] = {};
  S[id].cue = val;
  save();
}















function copyDay(di){
  const day = DAYS[di];
  const date = new Date().toLocaleDateString('zh-TW');
  let t = `${day.label}（${day.sublabel}）\n${date}\n原則：${day.principle}\n`;
  if(day.skipNote) t += `${day.skipNote}\n`;
  t += '\n';
  day.exercises.forEach(ex_ => {
    const d = S[ex_.id];
    t += ex_.name + '\n';
    if(d){
      (d.b||[]).forEach(s => { t += `👍 ${s.wt||'__'}kg × ${s.c||'__'}組${s.r||'__'}下\n`; });
      (d.w||[]).forEach(s => { t += `✅ ${s.wt||'__'}kg × ${s.c||'__'}組${s.r||'__'}下\n`; });
    }
    t += '\n';
  });
  navigator.clipboard.writeText(t.trim())
    .then(() => toast('已複製到剪貼簿 ✓'))
    .catch(() => toast('複製失敗'));
}

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

/* ── Init ── */
load();
build();
const _initSub = document.getElementById('daySubLabel');
if(_initSub) _initSub.textContent = DAYS[0].sublabel;
loadFromGist();
</script>
