<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WG&Chunithm</title>
<meta name="application-name" content="WG&Chunithm">
<meta name="apple-mobile-web-app-title" content="WG&Chunithm">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#101014">
<style>
:root{
  --bg:#101014; --panel:#1a1a22; --panel2:#20202b;
  --ink:#f2f0ea; --sub:#9a97a6;
  --wg:#e6294b; --chu:#f5c518; --mai:#ff4fa3; --line:#2c2c38;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;min-height:100vh;padding-bottom:60px}
.wrap{max-width:560px;margin:0 auto;padding:0 16px}
header{padding:34px 0 20px;text-align:center}
.eyebrow{font-size:11px;letter-spacing:.35em;color:var(--sub);text-transform:uppercase;margin-bottom:10px}
h1{font-size:26px;font-weight:900;letter-spacing:.04em}
h1 .wgc{color:var(--wg)} h1 .chc{color:var(--chu)} h1 .maic{color:var(--mai)}
.tagline{font-size:12.5px;color:var(--sub);margin-top:8px}
.searchbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:6px}
.inputrow{display:flex;gap:8px}
input[type=text]{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:12px 14px;font-size:15px;outline:none;min-width:0}
input[type=text]:focus{border-color:var(--chu)}
button{cursor:pointer;border:none;border-radius:10px;font-family:inherit}
.gobtn{background:var(--chu);color:#181405;font-weight:800;font-size:15px;padding:12px 18px;flex-shrink:0}
.gobtn:active{transform:scale(.97)}
.gobtn:disabled{opacity:.5;cursor:wait}
.subrow{display:flex;justify-content:space-between;align-items:center;margin-top:11px;gap:8px;flex-wrap:wrap}
.locbtn{background:none;border:1px solid var(--line);color:var(--sub);font-size:12.5px;padding:7px 12px;border-radius:999px}
.locbtn:active{color:var(--ink)}
.toggle{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--sub);cursor:pointer;user-select:none}
.toggle input{accent-color:var(--wg);width:15px;height:15px}
.status{font-size:12.5px;color:var(--sub);margin-top:12px;min-height:1em}
.status.err{color:#ff8080}
#results{display:none;margin-top:22px}
.origin{font-size:12px;color:var(--sub);margin-bottom:14px;line-height:1.5}
.combo{border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:22px;background:linear-gradient(135deg,rgba(230,41,75,.10),rgba(245,197,24,.10))}
.combo-head{padding:11px 16px;font-size:11px;letter-spacing:.28em;color:var(--ink);border-bottom:1px solid var(--line);font-weight:700}
.combo-body{padding:14px 16px 16px}
.combo-line{display:flex;align-items:baseline;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.combo-line .who{font-weight:800;font-size:15.5px}
.combo-line .d{font-size:12.5px;color:var(--sub)}
.combo-gap{font-size:12.5px;color:var(--chu);margin-top:7px;font-weight:700}
.seclabel{display:flex;align-items:center;gap:10px;margin:20px 0 10px}
.seclabel .dot{width:9px;height:9px;border-radius:2px;transform:rotate(45deg)}
.seclabel .t{font-size:13.5px;font-weight:800;letter-spacing:.06em}
.seclabel .n{font-size:11px;color:var(--sub);margin-left:auto}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px;display:flex;gap:12px;align-items:center}
.rankd{flex-shrink:0;width:66px;text-align:center}
.rankd .km{font-size:17px;font-weight:900;font-variant-numeric:tabular-nums}
.rankd .u{font-size:10px;color:var(--sub);letter-spacing:.1em}
.info{flex:1;min-width:0}
.info .nm{font-weight:700;font-size:14.5px;line-height:1.35;word-break:break-word}
.info .ad{font-size:11.5px;color:var(--sub);margin-top:3px;line-height:1.45;word-break:break-word}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:1px;font-weight:700}
.badge.exp{background:rgba(230,41,75,.15);color:#ff7a92;border:1px solid rgba(230,41,75,.4)}
.badge.spt{background:rgba(85,170,255,.12);color:#7fbfff;border:1px solid rgba(85,170,255,.35)}
.badge.warn{background:rgba(245,197,24,.12);color:var(--chu);border:1px solid rgba(245,197,24,.4)}
.badge.mai{background:rgba(255,79,163,.12);color:var(--mai);border:1px solid rgba(255,79,163,.4)}
.badge.old{background:rgba(154,151,166,.12);color:var(--sub);border:1px solid var(--line)}
.navbtn{flex-shrink:0;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font-size:12px;padding:8px 12px;border-radius:9px;text-decoration:none}
.navbtn:active{border-color:var(--chu)}
.note{font-size:11px;color:var(--sub);line-height:1.7;margin-top:24px;border-top:1px solid var(--line);padding-top:14px}
@media (prefers-reduced-motion:no-preference){
  #results.show{animation:up .35s ease}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="eyebrow">GYM × GAME RADAR</div>
  <h1><span class="wgc">World Gym</span> × <span class="chc">CHUNITHM</span><br>雙店距離雷達</h1>
  <div class="tagline">輸入地址,找出離你最近的健身房、CHUNITHM 和 maimai 機廳</div>
</header>

<div class="searchbox">
  <div class="inputrow">
    <input type="text" id="addr" placeholder="例:桃園市中壢區中華路二段501號" enterkeyhint="search">
    <button class="gobtn" id="go">查詢</button>
  </div>
  <div class="subrow">
    <button class="locbtn" id="useloc">📍 使用目前位置</button>
    <label class="toggle"><input type="checkbox" id="noexp" checked>排除 Express 店(無淋浴)</label>
  </div>
  <div class="status" id="status"></div>
</div>

<div id="results">
  <div class="origin" id="origin"></div>
  <div class="combo" id="combo" style="display:none">
    <div class="combo-head">⚡ 一次搞定路線</div>
    <div class="combo-body" id="combobody"></div>
  </div>
  <div class="seclabel"><span class="dot" style="background:var(--wg)"></span><span class="t">最近的 World Gym</span><span class="n" id="wgn"></span></div>
  <div id="wglist"></div>
  <div class="seclabel"><span class="dot" style="background:var(--chu)"></span><span class="t">最近的 CHUNITHM 機廳</span><span class="n" id="arcn"></span></div>
  <div id="arclist"></div>
  <div class="seclabel"><span class="dot" style="background:var(--mai)"></span><span class="t">最近的 maimai 機廳</span><span class="n" id="main2"></span></div>
  <div id="mailist"></div>
</div>

<div class="note"><div id="upd" style="margin-bottom:6px"></div>
  資料來源:World Gym 官網(140 間)與 Music Game Map 音Game地圖社群資料(63 廳/168 台)與 maimai(119 廳,2026/07)。機廳附台數與營業時間,機況以現場為準。距離為直線距離,實際路程會略多。地址查詢使用 OpenStreetMap,輸入越完整越準。
</div>
</div>

// 優先載入同站的 data.json(由 GitHub Actions 自動更新)
fetch('./data.json?t='+Date.now()).then(r=>r.ok?r.json():null).then(j=>{
  if(j&&j.wg&&j.arc){DATA=j;
    const el=document.getElementById('upd');
    if(el&&j.wg_updated)el.textContent='健身房資料更新於 '+j.wg_updated+(j.arc_updated?' ・ 機廳資料更新於 '+j.arc_updated:'');
    if(lastPos)search(lastPos.lat,lastPos.lng,lastPos.label);
  }
}).catch(()=>{});
const $=id=>document.getElementById(id);
const R=6371;
function hav(a,b,c,d){const p=Math.PI/180,dp=(c-a)*p,dl=(d-b)*p;
  const x=Math.sin(dp/2)**2+Math.cos(a*p)*Math.cos(c*p)*Math.sin(dl/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));}
function fmt(km){return km<1?Math.round(km*1000)+' m':km.toFixed(2)+' km';}
function fmtN(km){return km<1?[Math.round(km*1000),'公尺']:[km.toFixed(2),'公里'];}
function gmap(la,lo){return 'https://maps.google.com/maps?q='+la+','+lo;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function search(lat,lng,label){
  const noexp=$('noexp').checked;
  const wgs=DATA.wg.filter(w=>!noexp||w.t!=='Express')
    .map(w=>({...w,d:hav(lat,lng,w.la,w.lo)})).sort((a,b)=>a.d-b.d);
  const arcs=DATA.arc.map(a=>({...a,d:hav(lat,lng,a.la,a.lo)})).sort((a,b)=>a.d-b.d);

  $('origin').innerHTML='📍 查詢位置:'+esc(label);
  $('wgn').textContent=noexp?'已排除 Express':'含所有店型';
  $('arcn').textContent='共 '+DATA.arc.length+' 廳';

  const card=(x,isWG)=>{
    const [num,unit]=fmtN(x.d);
    let badge='';
    if(isWG&&x.t==='Express')badge='<span class="badge exp">Express</span>';
    if(isWG&&x.t==='Sport')badge='<span class="badge spt">Sport</span>';
    if(!isWG&&x.cnt)badge='<span class="badge warn">'+x.cnt+' 台</span>';
    return `<div class="card">
      <div class="rankd"><div class="km" style="color:${isWG?'var(--wg)':'var(--chu)'}">${num}</div><div class="u">${unit}</div></div>
      <div class="info"><div class="nm">${esc(isWG?'World Gym '+x.n:x.n)}${badge}</div><div class="ad">${esc(x.a)}${!isWG&&x.open&&x.open!=='未知'?' ・ '+esc(x.open):''}</div></div>
      <a class="navbtn" target="_blank" rel="noopener" href="${gmap(x.la,x.lo)}">導航</a></div>`;
  };
  $('wglist').innerHTML=wgs.slice(0,3).map(w=>card(w,true)).join('');
  $('arclist').innerHTML=arcs.slice(0,3).map(a=>card(a,false)).join('');
  // maimai(獨立顯示)
  const mais=(DATA.mai||[]).map(m=>({...m,d:hav(lat,lng,m.la,m.lo)})).sort((a,b)=>a.d-b.d);
  $('main2').textContent='共 '+(DATA.mai||[]).length+' 廳';
  $('mailist').innerHTML=mais.slice(0,3).map(m=>{
    const [num,unit]=fmtN(m.d);
    const dx=(m.v.match(/DX CiRCLEx(\d+)/)||[])[1]||0;
    const fin=(m.v.match(/FiNALEx(\d+)/)||[])[1]||0;
    const net=(m.v.match(/獨立網x(\d+)/)||[])[1]||0;
    let vb='';
    if(+dx)vb+='<span class="badge mai">DX×'+dx+'</span>';
    if(+fin)vb+='<span class="badge old">舊框×'+fin+'</span>';
    if(+net)vb+='<span class="badge old">獨立網×'+net+'</span>';
    return `<div class="card">
      <div class="rankd"><div class="km" style="color:var(--mai)">${num}</div><div class="u">${unit}</div></div>
      <div class="info"><div class="nm">${esc(m.n)}${vb}</div><div class="ad">${esc(m.a)}${m.open&&m.open!=='未知'?' ・ '+esc(m.open):''}</div></div>
      <a class="navbtn" target="_blank" rel="noopener" href="${gmap(m.la,m.lo)}">導航</a></div>`;
  }).join('');

  // 一次搞定:在前5近的WG中,找「離我距離 + WG到機廳距離」總和最小、且互距<1.2km的組合
  let best=null;
  for(const w of wgs.slice(0,5)){
    for(const a of arcs){
      const gap=hav(w.la,w.lo,a.la,a.lo);
      if(gap>1.2)continue;
      const score=w.d+gap;
      if(!best||score<best.score)best={w,a,gap,score};
    }
  }
  if(best){
    $('combo').style.display='block';
    $('combobody').innerHTML=
      `<div class="combo-line"><span class="who" style="color:var(--wg)">World Gym ${esc(best.w.n)}</span><span class="d">離你 ${fmt(best.w.d)}</span></div>`+
      `<div class="combo-line"><span class="who" style="color:var(--chu)">${esc(best.a.n)}</span><span class="d">離你 ${fmt(best.a.d)}</span></div>`+
      `<div class="combo-gap">兩店相距僅 ${fmt(best.gap)} — 練完直接走過去打機 🎵</div>`;
  }else{
    $('combo').style.display='block';
    $('combobody').innerHTML='<div class="combo-line"><span class="d">附近沒有互距 1.2 公里內的健身房+機廳組合,兩邊分開跑吧。</span></div>';
  }
  $('results').style.display='block';
  $('results').classList.remove('show');void $('results').offsetWidth;
  $('results').classList.add('show');
}

async function geocode(q){
  const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=tw&accept-language=zh-TW&q='+encodeURIComponent(q);
  const r=await fetch(url,{headers:{'Accept':'application/json'}});
  if(!r.ok)throw new Error('http '+r.status);
  const j=await r.json();
  if(!j.length)return null;
  return {lat:+j[0].lat,lng:+j[0].lon,name:j[0].display_name};
}

async function run(){
  const q=$('addr').value.trim();
  if(!q){$('status').textContent='請先輸入地址';$('status').className='status err';return;}
  $('go').disabled=true;
  $('status').textContent='定位中…';$('status').className='status';
  try{
    let g=await geocode(q);
    if(!g&&!/台灣|Taiwan/.test(q))g=await geocode(q+' 台灣');
    if(!g){$('status').textContent='找不到這個地址,試著加上縣市或簡化門牌';$('status').className='status err';}
    else{$('status').textContent='';search(g.lat,g.lng,g.name);}
  }catch(e){
    $('status').textContent='地址查詢服務暫時無法連線,請稍後再試,或改用「使用目前位置」';
    $('status').className='status err';
  }
  $('go').disabled=false;
}

$('go').onclick=run;
$('addr').addEventListener('keydown',e=>{if(e.key==='Enter')run();});
$('noexp').addEventListener('change',()=>{ if($('results').style.display==='block'&&lastPos)search(lastPos.lat,lastPos.lng,lastPos.label); });
let lastPos=null;
const _search=search; search=(a,b,c)=>{lastPos={lat:a,lng:b,label:c};_search(a,b,c);};

function locate(auto){
  if(!navigator.geolocation){
    if(!auto){$('status').textContent='此裝置不支援定位';$('status').className='status err';}
    return;
  }
  $('status').textContent='取得定位中…';$('status').className='status';
  navigator.geolocation.getCurrentPosition(
    p=>{$('status').textContent='';search(p.coords.latitude,p.coords.longitude,'目前位置('+p.coords.latitude.toFixed(4)+', '+p.coords.longitude.toFixed(4)+')');},
    err=>{
      if(auto){$('status').textContent='未取得定位權限,輸入地址查詢也可以';$('status').className='status';}
      else{$('status').textContent='無法取得定位(可能未授權或環境不支援),請改用地址查詢';$('status').className='status err';}
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000});
}
$('useloc').onclick=()=>locate(false);
// 開啟頁面時自動嘗試定位
window.addEventListener('load',()=>locate(true));
</script>
