<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YenTool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%;
  font-family: Microsoft JhengHei, sans-serif;
  background: linear-gradient(135deg, #0f172a, #312e81);
  color: white;
}
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 24px;
}
h1 { font-size: 1.8rem; font-weight: 800; }
p  { font-size: 0.9rem; opacity: 0.6; margin-top: 4px; }
.header { text-align: center; margin-bottom: 8px; }

.row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; width: 100%; }

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 24px 20px;
  text-align: center;
  text-decoration: none;
  color: white;
  transition: all 0.2s;
  cursor: pointer;
  width: 160px;
  min-width: 0;
}
@media (min-width: 500px) { .card { width: 220px; padding: 24px 32px; } }
.card:hover {
  background: rgba(255,255,255,0.18);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.card .icon { font-size: 2.2rem; margin-bottom: 10px; }
.card .name { font-size: 1rem; font-weight: 700; }
.card .desc { font-size: 0.78rem; opacity: 0.55; margin-top: 4px; }
.footer { font-size: 0.75rem; opacity: 0.35; margin-top: 24px; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>YenTool</h1>
    <p>請選擇要使用的工具</p>
  </div>

  <div class="row">
    <a class="card" href="radar/">
      <div class="icon">📡</div>
      <div class="name">雷達</div>
      <div class="desc">maimai 雷達圖表</div>
    </a>
    <a class="card" href="workout/">
      <div class="icon">🏋️</div>
      <div class="name">健身課表</div>
      <div class="desc">每週訓練安排</div>
    </a>
  </div>

  <div class="footer">e24222.github.io</div>
</div>
</body>
</html>
